<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'DM Sans', -apple-system, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 12px; font-weight: 400; }
  .arr { stroke: #888; stroke-width: 1.5; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Outer container -->
<rect x="40" y="30" width="600" height="460" rx="20" fill="#f3f1ed" stroke="#e5e2dc" stroke-width="0.5"/>
<text class="title" x="340" y="58" text-anchor="middle" fill="#1a1a1a">Memory store (pgvector)</text>

<!-- Global scope -->
<rect x="70" y="80" width="560" height="100" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="title" x="350" y="112" text-anchor="middle" fill="#085041">Global scope</text>
<text class="sub" x="350" y="132" text-anchor="middle" fill="#0F6E56">System-wide knowledge — all agents, all teams, all sessions</text>
<text class="sub" x="350" y="150" text-anchor="middle" fill="#0F6E56">Written by supervisors or system processes</text>

<!-- Shared scope -->
<rect x="70" y="200" width="560" height="100" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="title" x="350" y="232" text-anchor="middle" fill="#3C3489">Shared scope</text>
<text class="sub" x="350" y="252" text-anchor="middle" fill="#534AB7">Crew-visible findings, decisions, agreed context</text>
<text class="sub" x="350" y="270" text-anchor="middle" fill="#534AB7">Any agent in the crew can read; creator owns writes</text>

<!-- Private scope: Agent A -->
<rect x="70" y="320" width="260" height="90" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="title" x="200" y="352" text-anchor="middle" fill="#712B13">Private scope</text>
<text class="sub" x="200" y="372" text-anchor="middle" fill="#993C1D">Agent A only</text>
<text class="sub" x="200" y="390" text-anchor="middle" fill="#993C1D">Reasoning traces, scratch</text>

<!-- Private scope: Agent B -->
<rect x="370" y="320" width="260" height="90" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="title" x="500" y="352" text-anchor="middle" fill="#712B13">Private scope</text>
<text class="sub" x="500" y="372" text-anchor="middle" fill="#993C1D">Agent B only</text>
<text class="sub" x="500" y="390" text-anchor="middle" fill="#993C1D">Failed attempts, dead ends</text>

<!-- Agent boxes -->
<rect x="130" y="440" width="120" height="36" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="title" x="190" y="462" text-anchor="middle" dominant-baseline="central" fill="#444441">Agent A</text>

<rect x="430" y="440" width="120" height="36" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="title" x="490" y="462" text-anchor="middle" dominant-baseline="central" fill="#444441">Agent B</text>

<!-- Arrows: Agent → Private (direct) -->
<line x1="190" y1="440" x2="190" y2="412" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="440" x2="490" y2="412" class="arr" marker-end="url(#arrow)"/>

<!-- Arrows: Agent → Shared (via center) -->
<path d="M190 440 L190 430 L350 430 L350 302" fill="none" class="arr" marker-end="url(#arrow)"/>
<path d="M490 440 L490 430 L350 430 L350 302" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- Arrows: Agent → Global (dashed, via sides) -->
<path d="M190 440 L190 425 L60 425 L60 130 L68 130" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<path d="M490 440 L490 425 L632 425 L632 130 L630 130" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

</svg>
