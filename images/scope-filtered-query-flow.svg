<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'DM Sans', -apple-system, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 12px; font-weight: 400; }
  .arr { stroke: #888; stroke-width: 1.5; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Step 1: Agent queries -->
<rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="title" x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#444441">Agent A queries memory</text>

<line x1="340" y1="64" x2="340" y2="90" class="arr" marker-end="url(#arrow)"/>

<!-- Step 2: Build scope filter -->
<rect x="200" y="90" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="title" x="340" y="110" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Build scope filter</text>
<text class="sub" x="340" y="128" text-anchor="middle" dominant-baseline="central" fill="#534AB7">agent_id + crew_id → WHERE clause</text>

<line x1="340" y1="146" x2="340" y2="172" class="arr" marker-end="url(#arrow)"/>

<!-- Step 3: pgvector search -->
<rect x="160" y="172" width="360" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="title" x="340" y="192" text-anchor="middle" dominant-baseline="central" fill="#085041">pgvector HNSW search</text>
<text class="sub" x="340" y="210" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Scope filter applied at index scan, not post-filter</text>

<line x1="340" y1="228" x2="340" y2="258" class="arr" marker-end="url(#arrow)"/>

<!-- Partial indexes container -->
<rect x="60" y="258" width="560" height="180" rx="16" fill="#f3f1ed" stroke="#e5e2dc" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="title" x="340" y="284" text-anchor="middle" fill="#555">Three partial HNSW indexes (one per scope)</text>

<!-- Global index -->
<rect x="90" y="304" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="title" x="170" y="324" text-anchor="middle" dominant-baseline="central" fill="#085041">Global index</text>
<text class="sub" x="170" y="342" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">scope = 'global'</text>

<!-- Shared index -->
<rect x="260" y="304" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="title" x="340" y="324" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Shared index</text>
<text class="sub" x="340" y="342" text-anchor="middle" dominant-baseline="central" fill="#534AB7">crew_id match</text>

<!-- Private index -->
<rect x="430" y="304" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="title" x="510" y="324" text-anchor="middle" dominant-baseline="central" fill="#712B13">Private index</text>
<text class="sub" x="510" y="342" text-anchor="middle" dominant-baseline="central" fill="#993C1D">agent_id match</text>

<!-- Access labels -->
<text class="sub" x="170" y="384" text-anchor="middle" fill="#0F6E56">✓ Always searched</text>
<text class="sub" x="340" y="384" text-anchor="middle" fill="#534AB7">✓ If same crew</text>
<text class="sub" x="510" y="384" text-anchor="middle" fill="#993C1D">✓ Only own agent</text>

<!-- Exclusion note -->
<text class="sub" x="340" y="415" text-anchor="middle" fill="#c45d3e">✗ Agent B's private memories are never scanned</text>

<line x1="340" y1="438" x2="340" y2="464" class="arr" marker-end="url(#arrow)"/>

<!-- Merge + rank -->
<rect x="200" y="464" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="title" x="340" y="484" text-anchor="middle" dominant-baseline="central" fill="#085041">Merge + rank by distance</text>
<text class="sub" x="340" y="502" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Top-k results from all accessible scopes</text>

<line x1="340" y1="520" x2="340" y2="546" class="arr" marker-end="url(#arrow)"/>

<!-- Return -->
<rect x="220" y="546" width="240" height="28" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="title" x="340" y="564" text-anchor="middle" dominant-baseline="central" fill="#444441">Return to Agent A</text>

</svg>
